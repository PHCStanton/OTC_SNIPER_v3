<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Ghost Preview</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: #c8cdd8;
      margin-bottom: 20px;
      font-weight: 300;
      letter-spacing: 2px;
    }
    .ghost-wrapper {
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Animated Ghost Icon</h1>
    <div class="ghost-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
        <defs>
          <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff; stop-opacity:1" />
            <stop offset="100%" style="stop-color:#d8dce6; stop-opacity:1" />
          </linearGradient>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#b0b8c8" flood-opacity="0.35"/>
          </filter>
        </defs>
        <style>
          @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
          @keyframes sway { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(2deg); } 75% { transform: rotate(-2deg); } }
          @keyframes waveLeft { 0%, 100% { transform: rotate(0deg) translateX(0px); } 50% { transform: rotate(-8deg) translateX(-5px); } }
          @keyframes waveRight { 0%, 100% { transform: rotate(0deg) translateX(0px); } 50% { transform: rotate(8deg) translateX(5px); } }
          @keyframes blink { 0%, 42%, 44%, 96%, 98%, 100% { transform: scaleY(1); } 43%, 97% { transform: scaleY(0.1); } }
          @keyframes smilePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
          .ghost-body { animation: float 3s ease-in-out infinite; }
          .ghost-sway { animation: sway 4s ease-in-out infinite; transform-origin: 150px 100px; }
          .left-arm { animation: waveLeft 2.5s ease-in-out infinite; transform-origin: 95px 200px; }
          .right-arm { animation: waveRight 2.5s ease-in-out infinite 0.3s; transform-origin: 205px 200px; }
          .eye { animation: blink 4s ease-in-out infinite; transform-origin: center; }
          .eye-right { animation: blink 4s ease-in-out infinite 0.1s; transform-origin: center; }
          .smile { animation: smilePulse 3s ease-in-out infinite; transform-origin: 150px 210px; }
        </style>
        <g class="ghost-body">
          <g class="ghost-sway">
            <path d="M 150 30 C 85 30, 45 85, 45 150 L 45 220 C 45 235, 55 245, 65 235 C 75 225, 85 240, 90 250 C 95 260, 100 265, 110 260 L 115 250 C 120 245, 130 260, 135 268 C 140 275, 145 278, 150 275 C 155 278, 160 275, 165 268 C 170 260, 180 245, 185 250 L 190 260 C 200 265, 205 260, 210 250 C 215 240, 225 225, 235 235 C 245 245, 255 235, 255 220 L 255 150 C 255 85, 215 30, 150 30 Z" fill="url(#ghostGrad)" stroke="#c8cdd8" stroke-width="1" filter="url(#shadow)"/>
            <g class="left-arm">
              <path d="M 55 180 C 30 185, 15 210, 25 230 C 35 250, 55 245, 60 235 C 50 225, 45 215, 55 200 Z" fill="url(#ghostGrad)" stroke="#c8cdd8" stroke-width="1"/>
            </g>
            <g class="right-arm">
              <path d="M 245 180 C 270 185, 285 210, 275 230 C 265 250, 245 245, 240 235 C 250 225, 255 215, 245 200 Z" fill="url(#ghostGrad)" stroke="#c8cdd8" stroke-width="1"/>
            </g>
            <g class="eye"><rect x="115" y="150" width="18" height="32" rx="9" ry="9" fill="#c8cdd8"/></g>
            <g class="eye-right"><rect x="167" y="150" width="18" height="32" rx="9" ry="9" fill="#c8cdd8"/></g>
            <g class="smile">
              <path d="M 138 200 C 138 200, 142 215, 150 215 C 158 215, 162 200, 162 200" fill="none" stroke="#c8cdd8" stroke-width="3" stroke-linecap="round"/>
              <circle cx="150" cy="210" r="5" fill="#c8cdd8"/>
            </g>
          </g>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
