<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Outer Component Frame -->
  <rect x="10" y="10" width="80" height="80" rx="10" fill="#1E1E2E" stroke="#4A90E2" stroke-width="2"/>
  
  <!-- Inner Moving Blue Component -->
  <rect id="inner-component" x="15" y="15" width="60" height="60" rx="5" fill="#4A90E2" stroke="#ffffff" stroke-width="2" opacity="0"/>
  
  <!-- Small Orange Component -->
  <rect id="small-component" x="35" y="35" width="30" height="30" rx="3" fill="#FFA500" stroke="#ffffff" stroke-width="2" opacity="0"/>
  
  <!-- Animation for Blue Square Moving Out -->
  <animateTransform 
    xlink:href="#inner-component"
    attributeName="transform" 
    type="translate" 
    from="0 0" to="20 20" 
    dur="0.2s" 
    fill="freeze" 
    begin="0.5s"/>
  <animate 
    xlink:href="#inner-component"
    attributeName="opacity"
    from="0" to="1"
    dur="1.0s"
    fill="freeze"
    begin="0.15s"/>
  
  <!-- Animation for Orange Square Appearing Out of Blue -->
  <animateTransform 
    xlink:href="#small-component"
    attributeName="transform" 
    type="translate" 
    from="0 0" to="32 35" 
    dur="0.2s" 
    fill="freeze" 
    begin="1.5s"/>
  <animate 
    xlink:href="#small-component"
    attributeName="opacity"
    from="0" to="1"
    dur="3.2s"
    fill="freeze"
    begin="1.5s"/>
</svg>